    </filter>
  </defs>
  <title>Saída de Pista Simples</title>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect x="28" y="28" width="1544" height="844" rx="36" fill="none" stroke="rgba(255,255,255,.08)"/>
  
  <g filter="url(#shadow)">
    <rect x="72" y="70" width="570" height="150" rx="28" fill="#0d1723" stroke="#24425f"/>
    <text x="110" y="128" fill="#9bc7ff" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">TIPO DE SINISTRO</text>
    <text x="110" y="180" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="800">5.1 · Saída de Pista Simples</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="485" width="1130" height="230" rx="40" fill="url(#road)"/>
    <rect x="180" y="592" width="140" height="16" rx="8" fill="#ffe082"/>
    <rect x="390" y="592" width="140" height="16" rx="8" fill="#ffe082"/>
    <rect x="600" y="592" width="140" height="16" rx="8" fill="#ffe082"/>
    <path d="M970 575 C 1150 560, 1260 500, 1420 355" fill="none" stroke="#243341" stroke-width="170" stroke-linecap="round"/>
    <path d="M970 575 C 1150 560, 1260 500, 1420 355" fill="none" stroke="#ffe082" stroke-width="12" stroke-linecap="round" stroke-dasharray="55 38"/>
  </g>

  <g transform="translate(1190 458) rotate(-24)" filter="url(#shadow)">
    <rect x="-75.0" y="-41.0" width="150.0" height="82.0" rx="24.0" fill="url(#carBlue)" stroke="#dff2ff" stroke-width="3.0"/>
    <rect x="-37.5" y="-25.6" width="75.0" height="51.2" rx="18.0" fill="#d9f2ff" opacity="0.86"/>
    <rect x="-57.0" y="-27.0" width="16.0" height="54.0" rx="8.0" fill="#11304a" opacity="0.45"/>
    <rect x="41.0" y="-27.0" width="16.0" height="54.0" rx="8.0" fill="#11304a" opacity="0.45"/>
    <text x="0" y="10" text-anchor="middle" fill="#08131f" font-family="Segoe UI, Arial, sans-serif" font-size="28.0" font-weight="900">V1</text>
  </g>

  <g>
    <line x1="1010" y1="540" x2="1140" y2="470" stroke="#b7d7ff" stroke-width="10" stroke-linecap="round"/>
    <polygon points="1140,470 1118,454 1126,470 1118,486" fill="#b7d7ff"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="788" width="1456" height="78" rx="24" fill="#0d1723" stroke="#24425f"/>
    <text x="110" y="838" fill="#d8e8f8" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600">Veículo perde o controle direcional e abandona a pista sem capotar.</text>
